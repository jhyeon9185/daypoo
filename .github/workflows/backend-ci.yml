name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: daypoo
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: backend

      - name: Build and Test with Gradle
        run: ./gradlew build
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          POSTGRES_DB: daypoo
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: dummy_secret_key_for_testing_only_1234567890
          KAKAO_CLIENT_ID: dummy
          KAKAO_CLIENT_SECRET: dummy
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          TOSS_SECRET_KEY: dummy
