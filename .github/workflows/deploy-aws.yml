name: Deploy to AWS (DayPoo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: 백엔드 & AI 서비스 Docker 이미지 빌드 및 푸시 ──
  build-and-push-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 백엔드 이미지 빌드
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-backend:latest

      # AI 서비스 이미지 빌드
      - name: Build and push AI Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-ai:latest

  # ── Job 2: 프론트엔드 빌드 및 S3 업로드 ──
  build-and-sync-frontend:
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
          VITE_API_URL: '/api'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://daypoo-frontend-static --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  # ── Job 3: EC2에 Docker 컨테이너 배포 ──
  deploy-to-ec2:
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/daypoo/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DB_USERNAME,DB_HOST,DOCKERHUB_USERNAME,AWS_REGION,APP_CORS_ALLOWED_ORIGINS,APP_FRONTEND_URL,VITE_TOSS_CLIENT_KEY,VITE_KAKAO_MAP_KEY
          script: |
            set -e
            # 디렉토리 권한 확인 및 설정
            sudo mkdir -p /opt/daypoo
            sudo chown -R ec2-user:ec2-user /opt/daypoo

            # 새 이미지 가져오기 및 컨테이너 가동 (신규 설정 주입)
            cd /opt/daypoo
            
            # .env 파일 생성 (리눅스 인코딩 오류 방지를 위해 printf 사용)
            printf "DOCKERHUB_USERNAME=%s\n" "${{ secrets.DOCKERHUB_USERNAME }}" > .env
            printf "DB_HOST=%s\n" "${{ secrets.DB_HOST }}" >> .env
            printf "DB_PORT=5432\n" >> .env
            printf "POSTGRES_DB=daypoo_db\n" >> .env
            printf "POSTGRES_USER=daypoo\n" >> .env
            printf "POSTGRES_PASSWORD=%s\n" "${{ secrets.DB_PASSWORD }}" >> .env
            printf "AWS_REGION=%s\n" "${{ secrets.AWS_REGION }}" >> .env
            printf "ALLOWED_ORIGINS=%s\n" "${{ secrets.APP_CORS_ALLOWED_ORIGINS }}" >> .env
            printf "FRONTEND_URL=%s\n" "${{ secrets.APP_FRONTEND_URL }}" >> .env
            printf "JWT_SECRET_KEY=%s\n" "${{ secrets.JWT_SECRET_KEY }}" >> .env
            printf "KAKAO_CLIENT_ID=%s\n" "${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            printf "KAKAO_CLIENT_SECRET=%s\n" "${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
            printf "GOOGLE_CLIENT_ID=%s\n" "${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            printf "GOOGLE_CLIENT_SECRET=%s\n" "${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            printf "MAIL_USERNAME=%s\n" "${{ secrets.MAIL_USERNAME }}" >> .env
            printf "MAIL_PASSWORD=%s\n" "${{ secrets.MAIL_PASSWORD }}" >> .env
            printf "OPENAI_API_KEY=%s\n" "${{ secrets.OPENAI_API_KEY }}" >> .env
            printf "PUBLIC_DATA_API_KEY=%s\n" "${{ secrets.PUBLIC_DATA_API_KEY }}" >> .env
            printf "TOSS_SECRET_KEY=%s\n" "${{ secrets.TOSS_SECRET_KEY }}" >> .env
            printf "VITE_TOSS_CLIENT_KEY=%s\n" "${{ secrets.VITE_TOSS_CLIENT_KEY }}" >> .env
            printf "VITE_KAKAO_MAP_KEY=%s\n" "${{ secrets.VITE_KAKAO_MAP_KEY }}" >> .env
            printf "OPENSEARCH_URL=%s\n" "${{ secrets.OPENSEARCH_URL }}" >> .env
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d

            # 백엔드 헬스체크 (최대 3분 대기)
            echo "⏳ Waiting for backend to become healthy..."
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' daypoo-backend 2>/dev/null || echo "starting")
              echo "  [$i/18] Status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Backend is healthy!"
                break
              fi
              if [ $i -eq 18 ]; then
                echo "❌ Backend failed to become healthy. Last 50 lines of logs:"
                docker compose -f docker-compose.prod.yml logs backend --tail=50
                exit 1
              fi
              sleep 10
            done

            # 미사용 이미지 정리 (용량 확보)
            docker image prune -f
