name: Deploy to AWS (DayPoo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: 백엔드 & AI 서비스 Docker 이미지 빌드 및 푸시 ──
  build-and-push-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 백엔드 이미지 빌드
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-backend:latest

      # AI 서비스 이미지 빌드
      - name: Build and push AI Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-ai:latest

  # ── Job 2: 프론트엔드 빌드 및 S3 업로드 ──
  build-and-sync-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
          VITE_API_URL: '/api'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://daypoo-frontend-static --delete

  # ── Job 3: EC2에 Docker 컨테이너 배포 ──
  deploy-to-ec2:
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/daypoo/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DB_USERNAME,DOCKERHUB_USERNAME
          script: |
            # 디렉토리 권한 확인 및 설정
            sudo mkdir -p /opt/daypoo
            sudo chown -R ec2-user:ec2-user /opt/daypoo

            # 새 이미지 가져오기 및 컨테이너 가동 (환경 변수 적용)
            cd /opt/daypoo
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            
            # 미사용 이미지 정리 (용량 확보)
            docker image prune -f
