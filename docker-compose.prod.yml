version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/daypoo-backend:latest
    container_name: daypoo-backend
    ports:
      - "80:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod,simulation
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_CORS_ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - APP_FRONTEND_URL=${FRONTEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PUBLIC_DATA_API_KEY=${PUBLIC_DATA_API_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - AI_SERVICE_URL=http://ai:8000
      - OPENSEARCH_URL=${OPENSEARCH_URL}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M # t2.micro 메모리 사양 고려

  ai:
    image: ${DOCKERHUB_USERNAME}/daypoo-ai:latest
    container_name: daypoo-ai
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # 필요한 추가 환경변수가 있다면 여기 명시
    restart: always

  redis:
    image: redis:7-alpine
    container_name: daypoo-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis_data:
