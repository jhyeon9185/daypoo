spring:
  datasource:
    hikari:
      # AWS 프리티어(t2.micro) 메모리(1GB) 및 PostgreSQL 기본 max_connections(100) 고려
      # maximum-pool-size: 5 → 10 : 동시 요청 처리 여유 확보
      # minimum-idle: 2 → 5  : 서버 재시작 직후 커넥션 획득 대기 없이 즉시 처리 가능하도록
      # connection-timeout: 30000 → 5000 : 풀 고갈 시 30초 대기 대신 빠르게 실패 처리
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 5000
  
  jpa:
    hibernate:
      # 운영 환경에서는 update 대신 validate를 권장하지만, 초기 배포 편의성을 위해 update 유지
      ddl-auto: update
    show-sql: false
  
  config:
    activate:
      on-profile: prod

app:
  # CloudFront 도메인이 확정되면 해당 URL로 교체 필요
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    com.daypoo: INFO
    # 인증 지연/오류 원인 추적용. 안정화 이후 INFO로 되돌릴 것
    com.daypoo.api.service.AuthService: DEBUG
